<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>ScantyMeals Admin</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px;color:#1a1a1a}
    .stat{display:inline-block;padding:10px 16px;margin:8px;background:#f5f5f5;border-radius:6px}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{padding:8px;border:1px solid #ddd;text-align:left;font-size:14px}
    th{background:#fafafa}
    .btn{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-weight:600}
    .btn-danger{background:#dc3545;color:#fff}
    .err{padding:15px;background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;border-radius:4px;margin-bottom:20px}
    h1{color:#FF6B35;margin:0}
  </style>
</head>
<body>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <h1>Scanty Meals — Admin Dashboard</h1>
    <button id="logoutBtn" class="btn btn-danger" onclick="logout()" style="display:none">Logout</button>
  </div>

  <div id="authError" class="err" style="display:none">
    <strong>Unauthorized Access</strong><br>
    Your session has expired or you are not signed in as an admin.
    <br><br>
    <a href="/admin-login" style="color:#721c24;text-decoration:underline">Return to login</a>
  </div>

  <div id="adminContent" style="display:none">
    <div id="stats">
      <div class="stat">Total Orders: <span id="totalOrders">-</span></div>
      <div class="stat">Today's Orders: <span id="todayOrders">-</span></div>
      <div class="stat">Revenue: <span id="revenue">-</span></div>
    </div>

    <h2>Orders</h2>
    <div id="ordersContainer">Loading...</div>

    <h2>Customers</h2>
    <div id="customers">Loading...</div>
  </div>

  <script>
    // ============================================================
    // CONFIG — admin.html may be served from Render OR Firebase.
    // When served from Firebase, /api/** does not exist locally, so
    // we point to Render directly. Adjust this URL once if you move.
    // ============================================================
    const API_BASE = (location.hostname.endsWith('onrender.com') || location.hostname === 'localhost')
      ? ''  // same-origin
      : 'https://scantymeals-shop-1.onrender.com';

    const STORAGE_KEYS = ['token', 'user', 'admin_token'];
    let token = null;
    let headers = {};

    function getToken() {
      return localStorage.getItem('token') || sessionStorage.getItem('token');
    }

    function clearAuthStorage() {
      STORAGE_KEYS.forEach(k => {
        try { localStorage.removeItem(k); sessionStorage.removeItem(k); } catch (_) {}
      });
    }

    function logout() {
      clearAuthStorage();
      token = null;
      headers = {};
      // window.location.href = '/admin-login';
    }

    function showUnauthorized() {
      document.getElementById('adminContent').style.display = 'none';
      document.getElementById('authError').style.display = 'block';
      document.getElementById('logoutBtn').style.display = 'none';
      // Clear bad token so refresh from /admin-login is clean
      clearAuthStorage();
    }

    function showAdminContent() {
      document.getElementById('authError').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
      document.getElementById('logoutBtn').style.display = 'inline-block';
    }

    function api(path, opts = {}) {
      return fetch(API_BASE + path, { ...opts, headers: { ...headers, ...(opts.headers || {}) } });
    }

    async function fetchSummary() {
      try {
        const res = await api('/api/analytics/summary');
        if (res.status === 401 || res.status === 403) { showUnauthorized(); throw new Error('auth'); }
        if (!res.ok) throw new Error('summary fetch failed: ' + res.status);
        return await res.json();
      } catch (e) {
        console.error('fetchSummary:', e.message);
        return null;
      }
    }

    async function fetchOrders() {
      try {
        const res = await api('/api/orders');
        if (res.status === 401 || res.status === 403) { showUnauthorized(); throw new Error('auth'); }
        if (!res.ok) throw new Error('orders fetch failed: ' + res.status);
        return await res.json();
      } catch (e) {
        console.error('fetchOrders:', e.message);
        return null;
      }
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    function renderOrders(orders) {
      const container = document.getElementById('ordersContainer');
      if (!orders || !orders.length) { container.textContent = 'No orders'; return; }
      const rows = orders.map(o => {
        const id = escapeHtml(o.id);
        const total = (Number(o.total) || 0).toFixed(2);
        const statusOpts = ['Confirmed','Preparing','Ready','Delivered','Cancelled']
          .map(s => `<option ${o.status===s?'selected':''}>${s}</option>`).join('');
        return `<tr>
          <td>${id}</td>
          <td>${escapeHtml(o.customer_name)}</td>
          <td>${escapeHtml(o.customer_phone || '')}</td>
          <td>₵${total}</td>
          <td id="status-${id}">${escapeHtml(o.status)}</td>
          <td><select onchange="updateStatus('${id}', this.value)">${statusOpts}</select></td>
        </tr>`;
      }).join('');
      container.innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>Customer</th><th>Phone</th><th>Total</th><th>Status</th><th>Action</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    async function updateStatus(id, status) {
      try {
        const res = await api(`/api/orders/${encodeURIComponent(id)}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status }),
        });
        if (!res.ok) throw new Error('status update failed: ' + res.status);
        const data = await res.json();
        if (data.success) {
          const cell = document.getElementById('status-' + id);
          if (cell) cell.textContent = status;
        }
      } catch (e) {
        alert('Failed to update status');
        console.error(e);
      }
    }

    async function initDashboard() {
      const [sum, ord] = await Promise.all([fetchSummary(), fetchOrders()]);

      if (sum && typeof sum.total_orders !== 'undefined') {
        document.getElementById('totalOrders').textContent = sum.total_orders;
        document.getElementById('revenue').textContent = '₵' + (Number(sum.total_revenue) || 0).toFixed(2);
      }

      if (ord && Array.isArray(ord.orders)) {
        const today = new Date().toISOString().slice(0, 10);
        const todays = ord.orders.filter(o => o.date === today);
        document.getElementById('todayOrders').textContent = todays.length;
        renderOrders([...ord.orders].reverse());

        const map = new Map();
        ord.orders.forEach(o => {
          const k = o.customer_phone || o.customer_name;
          if (!k) return;
          map.set(k, { name: o.customer_name, phone: o.customer_phone });
        });
        const customers = [...map.values()];
        document.getElementById('customers').innerHTML =
          '<ul>' + customers.map(c =>
            `<li>${escapeHtml(c.name)}${c.phone ? ' — ' + escapeHtml(c.phone) : ''}</li>`
          ).join('') + '</ul>';
      } else {
        document.getElementById('ordersContainer').textContent = 'Unable to load orders';
      }
    }

    // ===== Bootstrap =====
    (function init() {
      token = getToken();
      if (!token) {
        // window.location.href = '/admin-login';
        return;
      }
      headers = {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token,
      };
      showAdminContent();
      initDashboard();
    })();
  </script>
</body>
</html>
